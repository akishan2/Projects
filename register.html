<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; background: #f6f6f6; }
        .box { border: 1px solid #ddd; padding: 25px; width: 350px; border-radius: 8px; background: white; }
        input { width: 94%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { background: #f0c14b; border: 1px solid #a88734; width: 100%; padding: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <a href="/" style="text-decoration:none; color:black;"><h1>BookSpace.io</h1></a>
    <div class="box">
        <h2>Create Account</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <p class="{{ category }}" style="color: {% if category == 'success' %}green{% else %}red{% endif %}; font-size: 14px; margin-bottom: 10px;">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form action="/register" method="POST">
            <label>First Name</label>
            <input type="text" name="first_name" placeholder="John" required>
            <label>Email</label>
            <input type="email" name="email" placeholder="email@example.com" required>
            <label>Password</label>
            <input type="password" name="password" placeholder="At least 6 characters" required>
            <button type="submit" class="btn">Create Account</button>
        </form>
        <p style="font-size:12px;">Already have an account? <a href="/login">Sign-In</a></p>
    </div>
</body>
</html>
