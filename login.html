<!DOCTYPE html>
<html>
<head>
    <title>Sign-In</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; background: #f6f6f6; }
        .box { border: 1px solid #ddd; padding: 25px; width: 350px; border-radius: 8px; background: white; }
        input { width: 94%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { background: #f0c14b; border: 1px solid #a88734; width: 100%; padding: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .error { color: red; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>BookSpace.io</h1>
    <div class="box">
        <h2>Sign-In</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <p class="{{ category }}" style="color: {% if category == 'success' %}green{% else %}red{% endif %}; font-size: 14px; margin-bottom: 10px;">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form action="/login" method="POST">
            <label>Email</label>
            <input type="email" name="email" required placeholder="example@mail.com">
            <label>Password</label>
            <input type="password" name="password" required>
            <button type="submit" class="btn">Sign-In</button>
        </form>
    </div>
    <p>New to BookSpace? <a href="/register">Create account</a></p>
</body>
</html>
