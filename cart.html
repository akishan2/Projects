<!DOCTYPE html>
<html>
<head>
    <title>Your Cart</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eaeded; padding: 20px; }
        .cart-box { background: white; max-width: 900px; margin: auto; padding: 20px; border-radius: 8px; }
        .item { display: flex; align-items: center; border-bottom: 1px solid #ddd; padding: 15px 0; justify-content: space-between; }
        .item-left { display: flex; align-items: center; }
        .item img { width: 80px; margin-right: 20px; }
        .remove-link { color: #007185; font-size: 13px; text-decoration: none; border: 1px solid #ddd; padding: 5px 10px; border-radius: 4px; background: #f7f8f8; }
        .remove-link:hover { background: #e7e9ec; color: #c45500; }
        .checkout-btn { background: #ffd814; border: 1px solid #fcd200; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 20px; display: block; text-align: center; color: black; text-decoration: none; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="cart-box">
        <h2>Shopping Cart <a href="/" style="float:right; font-size:14px; font-weight:normal;">Back to Store</a></h2>
        {% for item in items %}
        <div class="item">
            <div class="item-left">
                <img src="{{ item.cover_image_url }}">
                <div>
                    <h3 style="margin:0;">{{ item.title }}</h3>
                    <p style="color:#B12704; margin:5px 0; font-weight:bold;">₹{{ item.price }}</p>
                </div>
            </div>
            <a href="/remove_from_cart/{{ item.cart_id }}" class="remove-link">Delete</a>
        </div>
        {% endfor %}
        <h3 style="text-align:right;">Subtotal: ₹{{ total }}</h3>
        <a href="/payment?total={{ total }}" class="checkout-btn">Proceed to Buy</a>
    </div>
    {% include 'tracker.html' %}
</body>
</html>
